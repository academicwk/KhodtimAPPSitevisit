<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ระบบเยี่ยมบ้านนักเรียน KhodtimAPP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        .login-bg {
            background-image: url('https://images.unsplash.com/photo-1577896851231-70ef18881754?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen relative pb-20">

  <div id="login-view" class="min-h-screen flex flex-col items-center justify-center relative login-bg">
    <div class="absolute inset-0 bg-black bg-opacity-50"></div>
    <div class="relative z-10 w-full max-w-sm px-6 flex flex-col items-center">
      <div class="bg-white p-6 rounded-2xl shadow-xl w-full mb-6">
        <img src="https://img2.pic.in.th/KhodtimAPP.png" alt="Logo" class="w-auto h-32 mb-6 flex-col items-center mx-auto">
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2">ชื่อผู้ใช้ (Username)</label>
          <input type="text" id="username" class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="mb-6">
          <label class="block text-gray-700 text-sm font-bold mb-2">รหัสผ่าน (Password)</label>
          <input type="password" id="password" class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition duration-200">
          เข้าสู่ระบบ
        </button>

        <div class="mt-5">
          <div class="flex justify-center mb-2 opacity-90 hover:opacity-100 transition-opacity">
             <img src="https://img2.pic.in.th/4d3a830f3eb506411.png" alt="LogoEduSandbox" class="h-20 w-auto">
          </div>
          <div class="text-center text-[10px] md:text-xs text-red-900 mb-6 leading-tight font-medium">
            นวัตกรรมการด้านการบริหารจัดการสถานศึกษา<br>
            ได้รับการรับรองให้เป็นการปฏิบัติที่เป็นเลิศ (Best Practice)<br>
            ระดับดีเยี่ยม จากเทศบาลนครระยอง ปีการศึกษา 2566
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-Fkv-GGy4QnQE9gY05KNwqV7pDQHDThSL8wdcmnkF9xzG8yRzd4-sulkUTWnNKZsF/exec";

    document.addEventListener("DOMContentLoaded", () => {
      checkLocalSession(); 
    });

    async function checkLocalSession() {
      const storedUser = localStorage.getItem("homeVisitUser");
      if (storedUser) {
        try {
          const u = JSON.parse(storedUser);
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST', body: JSON.stringify({ action: "login", username: u.username, password: u.password }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });
          const result = await response.json();
          if (result.status === "success") {
            window.location.href = `students.html?room=${encodeURIComponent(result.teacherRoom)}&tname=${encodeURIComponent(result.teacherName)}`;
          } else {
            localStorage.removeItem("homeVisitUser");
          }
        } catch (error) { 
           // ปล่อยผ่านเงียบๆ หากยังไม่ได้ล็อกอิน
        }
      }
    }

    async function handleLogin() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      if(!user || !pass) { Swal.fire("แจ้งเตือน", "กรุณากรอกข้อมูลให้ครบถ้วน", "warning"); return; }

      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST', body: JSON.stringify({ action: "login", username: user, password: pass }),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        const result = await response.json();
        if (result.status === "success") {
          localStorage.setItem("homeVisitUser", JSON.stringify({username: user, password: pass}));
          Swal.fire({ title: 'สำเร็จ!', text: 'เข้าสู่ระบบเรียบร้อย', icon: 'success', timer: 1500, showConfirmButton: false }).then(() => {
              window.location.href = `students.html?room=${encodeURIComponent(result.teacherRoom)}&tname=${encodeURIComponent(result.teacherName)}`;
          });
        } else { Swal.fire("ข้อผิดพลาด", result.message, "error"); }
      } catch (error) { Swal.fire("ข้อผิดพลาด", "เชื่อมต่อฐานข้อมูลไม่สำเร็จ", "error"); }
    }
  </script>
</body>
</html>
