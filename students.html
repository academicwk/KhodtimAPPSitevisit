<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ระบบเยี่ยมบ้านนักเรียน KhodtimAPP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        .triangle-corner {
            position: absolute; top: 0; right: 0; width: 0; height: 0;
            border-top: 45px solid #3b82f6; border-left: 45px solid transparent; border-top-right-radius: 0.75rem; 
        }
        .sno-text { position: absolute; top: 4px; right: 6px; color: white; font-size: 14px; font-weight: bold; z-index: 10; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="main-view" class="max-w-md mx-auto bg-gray-50 min-h-screen shadow-md">
        <div class="bg-blue-600 text-white p-4 rounded-b-3xl shadow-lg relative">
            <div class="flex justify-between items-start mb-2">
                <div class="flex items-center space-x-3">
                    <img src="https://img2.pic.in.th/4d3a830f3eb506411.png" class="w-10 h-10 bg-white rounded-full p-1">
                    <div>
                        <p class="text-sm opacity-90">ระบบเยี่ยมบ้าน</p>
                        <p id="list-teacher-profile" class="font-bold text-lg">กำลังตรวจสอบข้อมูล...</p>
                    </div>
                </div>
                <button onclick="handleLogout()" class="text-xs bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-full shadow transition-colors">ออกจากระบบ</button>
            </div>
            <div class="mt-4 bg-white bg-opacity-20 p-3 rounded-xl border border-white border-opacity-30">
                <h2 class="text-xl font-bold text-center">โปรดเลือกรายชื่อนักเรียน</h2>
            </div>
        </div>

        <div class="px-4 mt-4">
            <div class="bg-white p-5 rounded-2xl shadow border border-gray-100 text-center">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wide">ความคืบหน้าการเยี่ยมบ้านประจำชั้น</p>
                <div class="my-1">
                    <span id="progressPercent" class="text-5xl font-black text-green-600">0%</span>
                </div>
                <p class="text-xs font-medium text-gray-500 mb-3">
                    เยี่ยมแล้ว <span id="visitedCount" class="font-bold text-gray-800 text-sm">0</span> จากทั้งหมด <span id="totalCount" class="font-bold text-gray-800 text-sm">0</span> คน
                </p>
                <div class="w-full bg-gray-200 rounded-full h-3.5 overflow-hidden">
                    <div id="progressBar" class="bg-green-500 h-full rounded-full transition-all duration-700 ease-out" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div id="studentListContainer" class="px-4 mt-4 space-y-3 pb-24"></div>
    </div>

<script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-Fkv-GGy4QnQE9gY05KNwqV7pDQHDThSL8wdcmnkF9xzG8yRzd4-sulkUTWnNKZsF/exec";
        
        let globalTeacherRoom = "";
        let globalTeacherName = "";

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            globalTeacherRoom = urlParams.get('room');
            globalTeacherName = urlParams.get('tname');

            if (!globalTeacherRoom) {
                window.location.href = 'index.html'; 
                return;
            } 
            
            document.getElementById('list-teacher-profile').innerText = `${globalTeacherName} (ห้อง ${globalTeacherRoom})`;
            fetchStudents();
        });

        function fetchStudents() {
            fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "getStudents", teacherRoom: globalTeacherRoom }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            })
            .then(res => res.json())
            .then(result => {
                if (result.status === 'success') {
                    renderStudentList(result.students);
                } else {
                    Swal.fire('ข้อผิดพลาด', 'ดึงข้อมูลล้มเหลว', 'error');
                }
            }).catch(err => { 
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ: " + err.message); 
            });
        }

        function renderStudentList(students) {
            const container = document.getElementById('studentListContainer');
            container.innerHTML = '';
            
            const total = students ? students.length : 0;
            const visited = students ? students.filter(s => s.visited).length : 0;
            const percent = total > 0 ? Math.round((visited / total) * 100) : 0;

            document.getElementById('totalCount').innerText = total;
            document.getElementById('visitedCount').innerText = visited;
            document.getElementById('progressPercent').innerText = percent + "%";
            document.getElementById('progressBar').style.width = percent + "%";
            
            if(!students || students.length === 0) {
                container.innerHTML = `<div class="bg-red-50 border border-red-200 p-4 rounded-xl text-center"><p class="text-red-500 font-bold text-sm">ไม่พบรายชื่อนักเรียนห้อง ${globalTeacherRoom} ในระบบ WeM-2026</p></div>`;
                return;
            }

            students.forEach(student => {
                const card = document.createElement("div");
                
                const isVisited = student.visited;
                const borderClass = isVisited ? "border-2 border-green-500 bg-green-50" : "border border-gray-100 bg-white";
                const triangleColor = isVisited ? "border-top-color: #22c55e;" : "border-top-color: #3b82f6;"; 
                const statusBadge = isVisited ? `<span class="absolute bottom-2 right-3 bg-green-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold shadow-sm">✔️ เยี่ยมแล้ว</span>` : '';

                card.className = `p-4 rounded-xl shadow relative overflow-hidden active:scale-95 transition-transform cursor-pointer ${borderClass}`;
                
                // นำสถานะโหลดออก และเปลี่ยนหน้าทันทีเมื่อกดคลิก
                card.addEventListener('click', () => {
                    const targetUrl = `form.html?sid=${encodeURIComponent(String(student.sid || ''))}&room=${encodeURIComponent(String(globalTeacherRoom || ''))}&tname=${encodeURIComponent(String(globalTeacherName || ''))}&fname=${encodeURIComponent(String(student.fname || ''))}&lname=${encodeURIComponent(String(student.lname || ''))}&pre=${encodeURIComponent(String(student.pre || ''))}&sno=${encodeURIComponent(String(student.sno || ''))}`;
                    window.location.href = targetUrl;
                });

                card.innerHTML = `
                    <div class="triangle-corner" style="${triangleColor}"></div>
                    <div class="sno-text">${student.sno}</div>
                    
                    <div class="flex items-center space-x-4">
                        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile" class="w-16 h-16 rounded-full object-cover border-2 shadow-sm opacity-80 ${isVisited ? 'border-green-300' : 'border-blue-100'}">
                        <div>
                            <p class="font-bold text-gray-800 text-base leading-tight">${student.fullName}</p>
                            <p class="text-xs text-gray-500 mt-1">รหัสนักเรียน: ${student.sid}</p>
                        </div>
                    </div>
                    ${statusBadge}
                `;
                container.appendChild(card);
            });
        }

        function handleLogout() {
            if (typeof Swal !== 'undefined') {
                Swal.fire({
                    title: 'ยืนยันการออกจากระบบ?', icon: 'question', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#3085d6', confirmButtonText: 'ออกจากระบบ', cancelButtonText: 'ยกเลิก'
                }).then((result) => {
                    if (result.isConfirmed) {
                        localStorage.removeItem("homeVisitUser");
                        window.location.href = 'index.html';
                    }
                });
            } else {
                localStorage.removeItem("homeVisitUser");
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
